<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax God - Olympus Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/olympus.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
</head>
<body>
    <!-- Public gate: home, login, register (shown when not authenticated) -->
    <div id="gate" class="gate-container">
        <div id="gate-content" class="gate-content"></div>
    </div>

    <!-- App shell: sidebar + dashboard (shown when authenticated) -->
    <div id="app-shell" class="app-container" style="display: none;">
        <!-- Sidebar (Ionic Column) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-text">TAX GOD</div>
                <div class="logo-subtext">AI ADVISORY</div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active" data-page="pantheon">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
                    <span>The Pantheon</span>
                </li>
                <li class="nav-item" data-page="oracle">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span>The Oracle</span>
                </li>
                <li class="nav-item" data-page="tribunal">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                    <span>Gabriel's Tribunal</span>
                </li>
                <li class="nav-item" data-page="archives">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
                    <span>The Archives</span>
                </li>
                <li class="nav-item" data-page="scrolls">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    <span>Sacred Scrolls</span>
                </li>
                <li class="nav-item" data-page="agora">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span>The Agora</span>
                </li>
                <li class="nav-item" data-page="hermes">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    <span>Temple of Hermes</span>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar (Frieze) -->
            <header class="topbar">
                <h2 class="page-title" id="page-title">The Pantheon</h2>
                
                <div class="user-profile" id="user-profile" title="Click to logout">
                    <div class="avatar" id="user-avatar">?</div>
                    <span class="username" id="user-name">Loading…</span>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="app" class="content-area">
                <!-- Views will be injected here by JS Router -->
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
