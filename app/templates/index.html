<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax God - Olympus Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/olympus.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
</head>
<body>
    <!-- Public gate: home, login, register (shown when not authenticated) -->
    <div id="gate" class="gate-container">
        <div id="gate-content" class="gate-content"></div>
    </div>

    <!-- App shell: sidebar + dashboard (shown when authenticated) -->
    <div id="app-shell" class="app-container" style="display: none;">
        <!-- Sidebar (Ionic Column) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-text">TAX GOD</div>
                <div class="logo-subtext">AI ADVISORY</div>
            </div>

            <div class="business-switcher" id="business-switcher">
                <select id="active-business" class="business-select">
                    <option>Loading...</option>
                </select>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active" data-page="pantheon">
                    <span class="nav-icon">🏠</span>
                    <span>Dashboard</span>
                </li>
                <li class="nav-item" data-page="oracle">
                    <span class="nav-icon">⚡</span>
                    <span>Tax God Agent</span>
                </li>
                <li class="nav-item" data-page="agora">
                    <span class="nav-icon">👥</span>
                    <span>Clients</span>
                </li>
                <li class="nav-item" data-page="finance">
                    <span class="nav-icon">💰</span>
                    <span>Finance</span>
                </li>
                <li class="nav-item" data-page="expenses">
                    <span class="nav-icon">📋</span>
                    <span>Expenses</span>
                </li>
                <li class="nav-item" data-page="reports">
                    <span class="nav-icon">📊</span>
                    <span>Reports</span>
                </li>
                <li class="nav-item" data-page="projects">
                    <span class="nav-icon">📁</span>
                    <span>Projects</span>
                </li>
                <li class="nav-item" data-page="scrolls">
                    <span class="nav-icon">📝</span>
                    <span>Documents</span>
                </li>
                <li class="nav-item" data-page="archives">
                    <span class="nav-icon">🔍</span>
                    <span>Research</span>
                </li>
                <li class="nav-item" data-page="tribunal">
                    <span class="nav-icon">🛡️</span>
                    <span>Audit</span>
                </li>

                <li class="nav-divider"></li>

                <li class="nav-item" data-page="business">
                    <span class="nav-icon">🏢</span>
                    <span>Business</span>
                </li>
                <li class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </li>
                <li class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </li>
                <li class="nav-item nav-settings" data-page="settings">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    <span>Settings</span>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar (Frieze) -->
            <header class="topbar">
                <h2 class="page-title" id="page-title">The Pantheon</h2>
                
                <div class="user-profile" id="user-profile" title="Click to logout">
                    <div class="avatar" id="user-avatar">?</div>
                    <span class="username" id="user-name">Loading…</span>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="app" class="content-area">
                <!-- Views will be injected here by JS Router -->
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
