services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxgod-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
